name: Build unsigned IPA (sideload)

# Produces an UNSIGNED .ipa for sideloading (AltStore / Sideloadly / TrollStore).
# No Apple Developer account required — the sideload tool re-signs at install.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'App.tsx'
      - 'app.json'
      - 'package.json'
      - '.github/workflows/build-ipa.yml'

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # Expo SDK 57 / RN 0.86 work with Xcode 16.x (Swift 6.x).
      # Xcode 26.0.1 on macOS-26 doesn't ship iOS SDK — use latest stable.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Verify iOS SDK availability
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Expo prebuild (generate native iOS project + pods)
        run: npx expo prebuild --platform ios

      # Patch expo-dev-menu Assets.xcassets — it ships simulator-specific runtime
      # version references that don't match all Xcode SDK builds. Strip the
      # simulator <Assets> so the device build doesn't choke on it.
      - name: Patch expo-dev-menu simulator assets
        run: |
          XCASSETS="node_modules/expo-dev-menu/ios/Assets.xcassets"
          if [ -f "$XCASSETS/Contents.json" ]; then
            echo "Before:"
            jq '.' "$XCASSETS/Contents.json"
            # Remove the simulator-specific data variant (iphonesimulator platform)
            jq '.properties |= map(select(.platform != "iphonesimulator"))' \
              "$XCASSETS/Contents.json" > /tmp/patched.json
            cp /tmp/patched.json "$XCASSETS/Contents.json"
            echo "After:"
            jq '.' "$XCASSETS/Contents.json"
          else
            echo "No Contents.json at $XCASSETS — maybe already removed?"
          fi

      - name: Detect workspace + scheme
        id: xc
        run: |
          cd ios
          WS=$(ls -d *.xcworkspace | head -1)
          # The app scheme matches the .xcodeproj name (NOT the first Pod scheme).
          SCHEME=$(basename "$(ls -d *.xcodeproj | head -1)" .xcodeproj)
          echo "workspace=$WS" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Using workspace=$WS scheme=$SCHEME"
          echo "--- available schemes ---"
          xcodebuild -workspace "$WS" -list 2>/dev/null | sed -n '/Schemes:/,$p' | head -20

      - name: Build unsigned (device)
        run: |
          cd ios
          xcodebuild build \
            -workspace "${{ steps.xc.outputs.workspace }}" \
            -scheme "${{ steps.xc.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/dd" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package .app into unsigned .ipa
        run: |
          cd "$RUNNER_TEMP"
          APP=$(find dd/Build/Products -maxdepth 2 -name '*.app' -path '*Release-iphoneos*' | head -1)
          echo "Packaging: $APP"
          test -n "$APP" || { echo "No .app found"; find dd/Build/Products -name '*.app'; exit 1; }
          rm -rf Payload && mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qry Pardalos-unsigned.ipa Payload
          ls -lh Pardalos-unsigned.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: pardalos-unsigned-ipa
          path: ${{ runner.temp }}/Pardalos-unsigned.ipa
          if-no-files-found: error
