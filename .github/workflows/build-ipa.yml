name: Build unsigned IPA (sideload)

# Produces an UNSIGNED .ipa for sideloading (AltStore / Sideloadly / TrollStore)
# that bundles the Pardalos web app as local assets — no external server needed.
# The frontend dist is pre-built and committed at web-assets/ in this repo.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'App.tsx'
      - 'app.json'
      - 'package.json'
      - 'scripts/**'
      - 'web-assets/**'
      - '.github/workflows/build-ipa.yml'

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # ── Step 1: Install iOS dependencies ──────────────────────────
      - name: Install iOS dependencies
        run: npm ci

      # ── Step 2: Expo prebuild (generate native iOS project) ───────
      - name: Expo prebuild (generate native iOS project)
        run: npx expo prebuild --platform ios

      # ── Step 3: Copy web assets into the generated Xcode project ──
      - name: Copy web assets to Xcode project
        run: |
          mkdir -p ios/Pardalos/web
          cp -R web-assets/* ios/Pardalos/web/
          echo "Web assets copied:"
          find ios/Pardalos/web -type f | head -10
          echo "... ($(find ios/Pardalos/web -type f | wc -l) files, $(du -sh ios/Pardalos/web | cut -f1) total)"

      # ── Step 4: Add web assets build phase to Xcode project ──────
      - name: Add web assets to Xcode build phase
        run: |
          gem install xcodeproj --no-document --quiet 2>/dev/null || true
          ruby scripts/bundle-web-assets.rb

      # ── Step 5: Detect workspace + scheme ────────────────────────
      - name: Detect workspace + scheme
        id: xc
        run: |
          cd ios
          WS=$(ls -d *.xcworkspace | head -1)
          SCHEME=$(basename "$(ls -d *.xcodeproj | head -1)" .xcodeproj)
          echo "workspace=$WS" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Using workspace=$WS scheme=$SCHEME"

      # ── Step 6: Build unsigned ───────────────────────────────────
      - name: Build unsigned (device)
        run: |
          cd ios
          xcodebuild build \
            -workspace "${{ steps.xc.outputs.workspace }}" \
            -scheme "${{ steps.xc.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/dd" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # ── Step 7: Package into unsigned .ipa ───────────────────────
      - name: Package .app into unsigned .ipa
        run: |
          cd "$RUNNER_TEMP"
          APP=$(find dd/Build/Products -maxdepth 2 -name '*.app' -path '*Release-iphoneos*' | head -1)
          echo "Packaging: $APP"
          test -n "$APP" || { echo "No .app found"; find dd/Build/Products -name '*.app'; exit 1; }
          rm -rf Payload && mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qry Pardalos-unsigned.ipa Payload
          ls -lh Pardalos-unsigned.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: pardalos-unsigned-ipa
          path: ${{ runner.temp }}/Pardalos-unsigned.ipa
          if-no-files-found: error
