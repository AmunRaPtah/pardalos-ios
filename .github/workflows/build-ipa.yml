name: Build unsigned IPA (sideload)

# Produces an UNSIGNED .ipa for sideloading (AltStore / Sideloadly / TrollStore)
# that bundles the Pardalos web app as local assets — no external server needed.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'App.tsx'
      - 'app.json'
      - 'package.json'
      - 'scripts/**'
      - '.github/workflows/build-ipa.yml'

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          path: pardalos-ios

      # We need the pardalos/frontend source to build the SPA
      - uses: actions/checkout@v4
        with:
          repository: AmunRaPtah/pardalos
          path: pardalos
          fetch-depth: 1

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            pardalos-ios/package-lock.json
            pardalos/frontend/package-lock.json

      # ── Step 1: Build the frontend SPA ────────────────────────────
      - name: Build frontend SPA
        run: |
          cd pardalos/frontend
          npm ci
          npm run build
          echo "Frontend built successfully"
          ls -la dist/

      # ── Step 2: Install iOS dependencies ──────────────────────────
      - name: Install iOS dependencies
        run: |
          cd pardalos-ios
          npm ci

      # ── Step 3: Copy web dist into iOS project ───────────────────
      - name: Copy web assets to iOS project
        run: |
          mkdir -p pardalos-ios/ios/Pardalos/web
          cp -R pardalos/frontend/dist/* pardalos-ios/ios/Pardalos/web/
          echo "Web assets copied:"
          find pardalos-ios/ios/Pardalos/web -type f | head -20
          echo "... ($(find pardalos-ios/ios/Pardalos/web -type f | wc -l) files total)"

      # ── Step 4: Expo prebuild ────────────────────────────────────
      - name: Expo prebuild (generate native iOS project)
        run: |
          cd pardalos-ios
          npx expo prebuild --platform ios

      # ── Step 5: Re-copy web assets (prebuild may have wiped ios/) ─
      - name: Re-copy web assets after prebuild
        run: |
          mkdir -p pardalos-ios/ios/Pardalos/web
          cp -R pardalos/frontend/dist/* pardalos-ios/ios/Pardalos/web/
          echo "Re-copied after prebuild:"
          ls pardalos-ios/ios/Pardalos/web/index.html

      # ── Step 6: Add web assets build phase to Xcode project ──────
      - name: Add web assets to Xcode project
        run: |
          cd pardalos-ios
          gem install xcodeproj --no-document --quiet 2>/dev/null || true
          ruby scripts/bundle-web-assets.rb

      # ── Step 7: Detect workspace + scheme ────────────────────────
      - name: Detect workspace + scheme
        id: xc
        run: |
          cd pardalos-ios/ios
          WS=$(ls -d *.xcworkspace | head -1)
          SCHEME=$(basename "$(ls -d *.xcodeproj | head -1)" .xcodeproj)
          echo "workspace=$WS" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Using workspace=$WS scheme=$SCHEME"
          echo "--- available schemes ---"
          xcodebuild -workspace "$WS" -list 2>/dev/null | sed -n '/Schemes:/,$p' | head -20

      # ── Step 8: Build unsigned ───────────────────────────────────
      - name: Build unsigned (device)
        run: |
          cd pardalos-ios/ios
          xcodebuild build \
            -workspace "${{ steps.xc.outputs.workspace }}" \
            -scheme "${{ steps.xc.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/dd" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # ── Step 9: Package into unsigned .ipa ───────────────────────
      - name: Package .app into unsigned .ipa
        run: |
          cd "$RUNNER_TEMP"
          APP=$(find dd/Build/Products -maxdepth 2 -name '*.app' -path '*Release-iphoneos*' | head -1)
          echo "Packaging: $APP"
          test -n "$APP" || { echo "No .app found"; find dd/Build/Products -name '*.app'; exit 1; }
          rm -rf Payload && mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qry Pardalos-unsigned.ipa Payload
          ls -lh Pardalos-unsigned.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: pardalos-unsigned-ipa
          path: ${{ runner.temp }}/Pardalos-unsigned.ipa
          if-no-files-found: error
