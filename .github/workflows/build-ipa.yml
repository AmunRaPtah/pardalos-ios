name: Build iOS IPA
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild iOS project
        run: npx expo prebuild --platform ios

      - name: Build with Xcode (development signing)
        run: |
          cd ios
          xcodebuild -workspace pardalos.xcworkspace \
            -scheme pardalos \
            -configuration Release \
            -sdk iphoneos \
            -allowProvisioningUpdates \
            -archivePath ../build/pardalos.xcarchive \
            archive
          xcodebuild -exportArchive \
            -archivePath ../build/pardalos.xcarchive \
            -exportPath ../build/ \
            -exportOptionsPlist ../export-options.plist \
            -allowProvisioningUpdates

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: pardalos-ipa
          path: build/*.ipa
