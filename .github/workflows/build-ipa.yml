name: Build IPA

# Produces an .ipa for sideloading (AltStore / SideStore / EAS).
# The app is a single full-screen WebView that loads Pardalos from the server.
# No local web assets are bundled — the web UI IS the server UI.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'App.tsx'
      - 'app.json'
      - 'package.json'
      - '.github/workflows/build-ipa.yml'

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Detect workspace + scheme
        id: xc
        run: |
          npx expo prebuild --platform ios --no-install
          cd ios
          WS=$(ls -d *.xcworkspace | head -1)
          SCHEME=$(basename "$(ls -d *.xcodeproj | head -1)" .xcodeproj)
          echo "workspace=$WS" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Using workspace=$WS scheme=$SCHEME"

      - name: Build unsigned (device)
        run: |
          cd ios
          xcodebuild build \
            -workspace "${{ steps.xc.outputs.workspace }}" \
            -scheme "${{ steps.xc.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/dd" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package .app into .ipa
        run: |
          cd "$RUNNER_TEMP"
          APP=$(find dd/Build/Products -maxdepth 2 -name '*.app' -path '*Release-iphoneos*' | head -1)
          echo "Packaging: $APP"
          test -n "$APP" || { echo "No .app found"; find dd/Build/Products -name '*.app'; exit 1; }
          rm -rf Payload && mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qry Pardalos.ipa Payload
          ls -lh Pardalos.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: pardalos-ipa
          path: ${{ runner.temp }}/Pardalos.ipa
          if-no-files-found: error
