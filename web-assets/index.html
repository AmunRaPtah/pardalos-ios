    <!-- Critical shell: painted before any JS executes so there is never a white frame -->
    <style>
      *,::before,::after{box-sizing:border-box;margin:0}
      html,body,#root{height:100%;width:100%}
      body{background:#0c0b12;color:#e8e6f0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
      #boot-shell{
        position:fixed;inset:0;display:flex;flex-direction:column;
        align-items:center;justify-content:center;gap:16px;
        background:#0c0b12;z-index:9999;transition:opacity .25s ease;
      }
      #boot-shell.hidden{opacity:0;pointer-events:none}
      .boot-ring{
        width:32px;height:32px;border-radius:50%;
        border:2px solid rgba(255,255,255,.08);
        border-top-color:#6366f1;
        animation:spin .8s linear infinite;

  <body>
    <!-- Visible immediately, removed once React mounts -->
    <div id="boot-shell">
      <div class="boot-ring"></div>
      <span class="boot-label">PARDALOS</span>
    </div>
    <div id="root"></div>
    <!-- If any hashed asset 404s (stale Safari cache served old index.html), force a hard reload -->
    <script>
      (function() {
        var _reloaded = sessionStorage.getItem('_asset_reload');
        window.addEventListener('error', function(e) {
          var src = e.target && (e.target.src || e.target.href || '');
          if (src && src.includes('/assets/') && !_reloaded) {
            sessionStorage.setItem('_asset_reload', '1');
            var url = location.pathname + '?_cb=' + Date.now();
            location.replace(url);
          }
        }, true);
        // Clear the reload guard once the page fully boots
        window.addEventListener('load', function() {
          sessionStorage.removeItem('_asset_reload');
        });
      })();
    </script>
  </body>
