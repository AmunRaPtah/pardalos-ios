# Codemagic iOS build
workflows:
  ios-preview:
    name: Build iOS IPA
    max_build_duration: 60
    environment:
      node: 22
      groups:
        - expo_credentials
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - npm ci
      - npx eas build -p ios --profile preview --non-interactive
    artifacts:
      - /tmp/expo/eas-build/**/*.ipa
